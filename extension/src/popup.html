<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinTech Intelligence</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      min-height: 480px;
      background: #0f0f17;
      color: #e2e2e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    .header {
      background: #13131a;
      border-bottom: 1px solid #2a2a3a;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { font-size: 20px; }
    .logo-text { font-size: 13px; font-weight: 600; color: #e2e2e8; }
    .logo-sub {
      font-family: 'Courier New', monospace;
      font-size: 9px; letter-spacing: 2px;
      text-transform: uppercase; color: #94a3b8; margin-top: 1px;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4ade80;
    }
    .status-dot.offline { background: #f87171; }

    /* ── Tabs ────────────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      border-bottom: 1px solid #2a2a3a;
      background: #13131a;
    }
    .tab {
      flex: 1; padding: 10px 6px;
      font-family: 'Courier New', monospace;
      font-size: 10px; letter-spacing: 1px;
      text-transform: uppercase; color: #64748b;
      border: none; background: none;
      cursor: pointer; transition: color 0.15s;
      border-bottom: 2px solid transparent;
    }
    .tab.active { color: #60a5fa; border-bottom-color: #60a5fa; }
    .tab:hover:not(.active) { color: #94a3b8; }

    /* ── Tab content ─────────────────────────────────────────────────── */
    .tab-content { display: none; padding: 14px 16px; }
    .tab-content.active { display: block; }

    /* ── Ask tab ─────────────────────────────────────────────────────── */
    .ask-row { display: flex; gap: 6px; margin-bottom: 12px; }
    input[type=text] {
      flex: 1; background: #1c1c26;
      border: 1px solid #2a2a3a; border-radius: 8px;
      color: #e2e2e8; font-size: 13px; padding: 8px 10px;
      font-family: inherit; outline: none; transition: border-color 0.15s;
    }
    input[type=text]:focus { border-color: #60a5fa; }
    .btn {
      background: #60a5fa; color: #fff; border: none;
      border-radius: 8px; padding: 8px 12px;
      font-family: 'Courier New', monospace; font-size: 10px;
      letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; transition: opacity 0.15s; white-space: nowrap;
    }
    .btn:hover { opacity: 0.9; }
    .btn-sm {
      padding: 5px 10px; font-size: 9px;
    }
    .btn-outline {
      background: transparent; border: 1px solid #2a2a3a; color: #94a3b8;
    }
    .btn-outline:hover { border-color: #60a5fa; color: #60a5fa; }
    .btn-green { background: #4ade80; color: #000; }
    .btn-red { background: transparent; border: 1px solid #f87171; color: #f87171; }

    #answer-box {
      background: #13131a; border: 1px solid #2a2a3a;
      border-radius: 8px; padding: 12px;
      font-size: 13px; line-height: 1.65; color: #cbd5e1;
      min-height: 60px; max-height: 200px; overflow-y: auto;
      margin-bottom: 10px;
    }
    .sources-label {
      font-family: 'Courier New', monospace;
      font-size: 9px; letter-spacing: 1.5px;
      text-transform: uppercase; color: #64748b; margin-bottom: 6px;
    }
    .source-link {
      display: block; padding: 6px 8px;
      background: #13131a; border: 1px solid #2a2a3a;
      border-radius: 6px; text-decoration: none;
      color: #94a3b8; font-size: 11px; margin-bottom: 4px;
      transition: border-color 0.15s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .source-link:hover { border-color: #60a5fa; color: #60a5fa; }

    /* ── Watchlist tab ───────────────────────────────────────────────── */
    .add-row { display: flex; gap: 6px; margin-bottom: 14px; }
    .watchlist-items { display: flex; flex-direction: column; gap: 6px; }
    .wl-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px; background: #13131a;
      border: 1px solid #2a2a3a; border-radius: 8px;
    }
    .wl-entity { font-size: 13px; color: #e2e2e8; }
    .wl-type {
      font-family: 'Courier New', monospace; font-size: 9px;
      letter-spacing: 1px; text-transform: uppercase;
      color: #c9a96e; margin-top: 1px;
    }
    .wl-sentiment {
      font-family: 'Courier New', monospace; font-size: 11px;
      font-weight: bold; margin-right: 8px;
    }
    .sent-pos { color: #4ade80; }
    .sent-neg { color: #f87171; }
    .sent-neu { color: #94a3b8; }
    .remove-btn {
      background: none; border: none; color: #64748b;
      font-size: 14px; cursor: pointer; padding: 2px 6px;
      border-radius: 4px; transition: color 0.15s;
    }
    .remove-btn:hover { color: #f87171; }

    /* ── Status tab ──────────────────────────────────────────────────── */
    .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .kpi {
      background: #13131a; border: 1px solid #2a2a3a;
      border-radius: 8px; padding: 10px; text-align: center;
    }
    .kpi-value { font-size: 22px; font-weight: bold; }
    .kpi-label {
      font-family: 'Courier New', monospace; font-size: 9px;
      letter-spacing: 1px; text-transform: uppercase;
      color: #94a3b8; margin-top: 3px;
    }
    .action-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .last-run {
      font-family: 'Courier New', monospace; font-size: 11px;
      color: #64748b; padding: 8px 10px;
      background: #13131a; border-radius: 8px;
      border: 1px solid #2a2a3a; margin-bottom: 10px;
    }

    /* ── Settings tab ────────────────────────────────────────────────── */
    .setting-label {
      font-family: 'Courier New', monospace; font-size: 9px;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: #94a3b8; margin-bottom: 5px; margin-top: 12px;
      display: block;
    }
    .setting-label:first-child { margin-top: 0; }
    .save-row { display: flex; gap: 6px; margin-top: 14px; }
    .feedback-msg {
      font-size: 11px; color: #4ade80; margin-top: 6px; display: none;
    }

    /* ── Shared ──────────────────────────────────────────────────────── */
    .loading {
      display: flex; align-items: center; gap: 8px;
      color: #94a3b8; font-size: 12px; padding: 8px 0;
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid #2a2a3a; border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { color: #64748b; font-size: 12px; text-align: center; padding: 16px 0; }
    .error-msg { color: #f87171; font-size: 12px; margin-top: 6px; }
    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <span class="logo-icon">🏦</span>
      <div>
        <div class="logo-text">FinTech Intelligence</div>
        <div class="logo-sub">Agent Extension</div>
      </div>
    </div>
    <div class="status-dot" id="status-dot" title="Checking connection…"></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="ask">Ask</button>
    <button class="tab" data-tab="watchlist">Watchlist</button>
    <button class="tab" data-tab="status">Status</button>
    <button class="tab" data-tab="settings">Settings</button>
  </div>

  <!-- ── Ask Tab ─────────────────────────────────────────────────────── -->
  <div class="tab-content active" id="tab-ask">
    <div class="ask-row">
      <input type="text" id="ask-input" placeholder="Ask about recent fintech news…">
      <button class="btn" id="ask-btn">Ask</button>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:12px;">
      <button class="btn btn-sm btn-outline" id="ask-page-btn">Ask about this page</button>
      <button class="btn btn-sm btn-outline" id="sidebar-btn">Open sidebar</button>
    </div>
    <div id="answer-loading" class="loading" style="display:none">
      <div class="spinner"></div><span>Searching archive…</span>
    </div>
    <div id="answer-box" style="display:none"></div>
    <div id="sources-section" style="display:none">
      <div class="sources-label">From your archive</div>
      <div id="sources-list"></div>
    </div>
    <div id="ask-error" class="error-msg"></div>
  </div>

  <!-- ── Watchlist Tab ────────────────────────────────────────────────── -->
  <div class="tab-content" id="tab-watchlist">
    <div class="add-row">
      <input type="text" id="wl-input" placeholder="Add company or topic…">
      <button class="btn btn-green btn-sm" id="wl-add-btn">+ Add</button>
    </div>
    <div id="wl-loading" class="loading" style="display:none">
      <div class="spinner"></div><span>Loading…</span>
    </div>
    <div class="watchlist-items" id="wl-list"></div>
    <div id="wl-error" class="error-msg"></div>
  </div>

  <!-- ── Status Tab ───────────────────────────────────────────────────── -->
  <div class="tab-content" id="tab-status">
    <div id="status-loading" class="loading">
      <div class="spinner"></div><span>Fetching status…</span>
    </div>
    <div id="status-content" style="display:none">
      <div class="kpi-grid">
        <div class="kpi">
          <div class="kpi-value" id="kpi-stories">—</div>
          <div class="kpi-label">Last digest</div>
        </div>
        <div class="kpi">
          <div class="kpi-value" id="kpi-status" style="font-size:18px">—</div>
          <div class="kpi-label">Status</div>
        </div>
      </div>
      <div class="last-run" id="last-run-text">Last run: —</div>
      <div class="action-row">
        <button class="btn btn-sm" id="run-now-btn">▶ Run Now</button>
        <button class="btn btn-sm btn-outline" id="preview-btn">Preview Email</button>
        <button class="btn btn-sm btn-outline" id="dashboard-btn">Dashboard</button>
      </div>
    </div>
  </div>

  <!-- ── Settings Tab ─────────────────────────────────────────────────── -->
  <div class="tab-content" id="tab-settings">
    <span class="setting-label">Backend URL</span>
    <input type="text" id="api-url-input" placeholder="https://your-app.onrender.com">

    <span class="setting-label">User ID</span>
    <input type="text" id="user-id-input" placeholder="1" style="max-width:80px">

    <div class="save-row">
      <button class="btn btn-sm" id="save-settings-btn">Save</button>
      <button class="btn btn-sm btn-outline" id="test-conn-btn">Test Connection</button>
    </div>
    <div class="feedback-msg" id="save-feedback">✅ Settings saved</div>
    <div id="conn-result" class="error-msg"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
